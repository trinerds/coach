# Dedicated E2E stack — isolated from local dev (Postgres 5439 / Redis 6379).
# Always run with project name coach-e2e (see package.json scripts) so this
# does not collide with the local docker-compose.yml stack.
# Usage:
#   pnpm e2e:setup     # infra + migrate/seed + app
#   pnpm e2e:up:infra  # Postgres + Redis only (host-run app via pnpm e2e:app:host)
#   pnpm e2e:down

services:
  postgres-e2e:
    image: postgres:16-alpine
    container_name: coach-postgres-e2e
    environment:
      POSTGRES_USER: watts
      POSTGRES_PASSWORD: password
      POSTGRES_DB: coach_e2e
    ports:
      - '5440:5432'
    volumes:
      - postgres_e2e_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U watts -d coach_e2e']
      interval: 5s
      timeout: 5s
      retries: 10

  redis-e2e:
    image: docker.dragonflydb.io/dragonflydb/dragonfly
    container_name: coach-redis-e2e
    ulimits:
      memlock: -1
    command:
      [
        '--default_lua_flags=allow-undeclared-keys',
        '--requirepass=dragonfly',
        '--proactor_threads=2',
        '--maxmemory=512mb'
      ]
    ports:
      - '6389:6379'

  app-e2e:
    build:
      context: .
      dockerfile: Dockerfile.e2e
    container_name: coach-app-e2e
    ports:
      - '3199:3000'
    environment:
      # In-compose service hostnames (override host-oriented .env.e2e values).
      # Quote URLs: unquoted `&` is a YAML anchor.
      DATABASE_URL: 'postgresql://watts:password@postgres-e2e:5432/coach_e2e?connection_limit=5&pool_timeout=10&connect_timeout=10'
      REDIS_URL: 'redis://:dragonfly@redis-e2e:6379/0'
      E2E_MODE: 'true'
      NODE_ENV: production
      HOST: 0.0.0.0
      NITRO_HOST: 0.0.0.0
      PORT: '3000'
      NUXT_AUTH_SECRET: e2e-test-auth-secret-change-me-min-32-chars
      NUXT_AUTH_ORIGIN: 'http://localhost:3199/api/auth'
      NUXT_PUBLIC_SITE_URL: 'http://localhost:3199/'
      DISABLE_EMAILS: 'true'
      TOLGEE_API_ENABLED: 'false'
      NUXT_PUBLIC_SUBSCRIPTIONS_ENABLED: 'false'
      CHAT_TURN_RUNNER_ENABLED: 'false'
      AUTH_BYPASS_USER: ''
      AUTH_BYPASS_NAME: ''
      GOOGLE_CLIENT_ID: e2e-placeholder
      GOOGLE_CLIENT_SECRET: e2e-placeholder
      STRAVA_CLIENT_ID: e2e-placeholder
      STRAVA_CLIENT_SECRET: e2e-placeholder
      INTERVALS_CLIENT_ID: e2e-placeholder
      INTERVALS_CLIENT_SECRET: e2e-placeholder
    depends_on:
      postgres-e2e:
        condition: service_healthy
      redis-e2e:
        condition: service_started
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3000/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 40s

volumes:
  postgres_e2e_data:
